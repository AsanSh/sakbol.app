name: sakbol_app
description: SakBol — health companion (Android + Web).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State / DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP / API
  dio: ^5.7.0

  # Routing
  go_router: ^14.6.1

  # Models / codegen
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.2.0

  # Files / camera / images
  file_picker: ^8.1.4
  image_picker: ^1.1.2

  # PDF viewer
  pdfx: ^2.6.0

  # Charts
  fl_chart: ^0.69.0

  # QR
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0

  # i18n
  intl: ^0.19.0

  # Utilities
  collection: ^1.18.0
  logger: ^2.4.0

  # Sentry (опционально, ключ позже)
  sentry_flutter: ^8.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.6.7
  riverpod_lint: ^2.3.13

  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
