# /etc/nginx/sites-available/api.sakbol — пример для production VPS.
# Замените server_name на реальный поддомен (api-v2.adventory.store до миграции, api.sakbol.app — после).

server {
    listen 80;
    server_name api-v2.adventory.store;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api-v2.adventory.store;

    ssl_certificate     /etc/letsencrypt/live/api-v2.adventory.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-v2.adventory.store/privkey.pem;

    client_max_body_size 50M;

    # NestJS backend в Docker, слушает 127.0.0.1:3001
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
