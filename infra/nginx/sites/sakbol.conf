# Лендинг (Astro static).

server {
    listen 80;
    server_name sakbol-v2.adventory.store;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sakbol-v2.adventory.store;

    ssl_certificate     /etc/letsencrypt/live/sakbol-v2.adventory.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sakbol-v2.adventory.store/privkey.pem;

    root /var/www/sakbol-landing;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
