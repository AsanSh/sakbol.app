# Flutter Web (SPA) — статика, отдаётся nginx напрямую.
# Замените server_name и пути к сертам.

server {
    listen 80;
    server_name app-v2.adventory.store;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app-v2.adventory.store;

    ssl_certificate     /etc/letsencrypt/live/app-v2.adventory.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app-v2.adventory.store/privkey.pem;

    root /var/www/sakbol-app;
    index index.html;

    # SPA fallback: всё что не файл — отдать index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
